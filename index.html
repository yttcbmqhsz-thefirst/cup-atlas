<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cup Atlas ☕ — Starbucks Collection</title>
<meta name="theme-color" content="#0e1512">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cup Atlas">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --green:#00704A; --green-bright:#00a862; --green-dark:#0b3d2e;
    --bg:#0e1512; --panel:#16201b; --panel-2:#1d2a23; --line:#2a3a31;
    --text:#e8f0ec; --muted:#93a89d; --danger:#e05d5d;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text);
  }
  /* ---------- Header ---------- */
  header{
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:14px 20px; background:linear-gradient(135deg,var(--green-dark),#123c2b 60%,#0e1512);
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:1000;
  }
  header h1{font-size:1.25rem; letter-spacing:.3px; display:flex; align-items:center; gap:8px}
  header h1 .siren{font-size:1.5rem}
  .stats{display:flex; gap:10px; margin-left:auto}
  .stat{
    background:rgba(255,255,255,.07); border:1px solid var(--line); border-radius:10px;
    padding:6px 14px; text-align:center; min-width:84px;
  }
  .stat b{display:block; font-size:1.15rem; color:var(--green-bright)}
  .stat span{font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.6px}
  /* ---------- Toolbar ---------- */
  .toolbar{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--line);
  }
  .toolbar input[type=search], .toolbar select{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:9px 12px; font-size:.9rem; outline:none;
  }
  .toolbar input[type=search]{flex:1; min-width:160px}
  .toolbar input[type=search]:focus, .toolbar select:focus{border-color:var(--green-bright)}
  .btn{
    border:none; border-radius:10px; padding:10px 16px; font-size:.9rem; font-weight:600;
    cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:filter .15s;
  }
  .btn:hover{filter:brightness(1.15)}
  @keyframes scanPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,168,98,.6)}50%{box-shadow:0 0 0 8px rgba(0,168,98,0)}}
  #btnScan{animation:scanPulse 1.6s ease-out infinite}
  .btn-primary{background:var(--green); color:#fff}
  .btn-ghost{background:var(--panel-2); color:var(--text); border:1px solid var(--line)}
  .btn-danger{background:var(--danger); color:#fff}
  .btn-sm{padding:6px 11px; font-size:.8rem; border-radius:8px}
  /* ---------- Layout ---------- */
  main{display:flex; flex-direction:column}
  #map{height:52vh; min-height:320px; background:#0a100d}
  .leaflet-container{font:inherit}
  .legend-strip{
    display:flex; gap:8px; overflow-x:auto; padding:10px 20px;
    background:var(--panel); border-bottom:1px solid var(--line); scrollbar-width:thin;
  }
  .legend-chip{
    display:inline-flex; align-items:center; gap:6px; white-space:nowrap; cursor:pointer;
    background:var(--panel-2); border:1px solid var(--line); border-radius:999px;
    padding:5px 12px; font-size:.8rem; color:var(--text);
  }
  .legend-chip:hover{border-color:var(--green-bright)}
  .legend-chip .dot{width:10px; height:10px; border-radius:50%; flex:none}
  .legend-chip .cnt{color:var(--muted)}
  /* ---------- Cup list ---------- */
  #list{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:14px; padding:18px 20px 90px;
  }
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; cursor:pointer; transition:transform .12s, border-color .12s;
    display:flex; flex-direction:column;
  }
  .card:hover{transform:translateY(-2px); border-color:var(--green-bright)}
  .card .thumb{
    height:150px; background:var(--panel-2); display:flex; align-items:center;
    justify-content:center; font-size:3rem; overflow:hidden; position:relative;
  }
  .card .thumb img{width:100%; height:100%; object-fit:cover}
  .card .thumb .country-tag{
    position:absolute; top:8px; left:8px; font-size:.72rem; font-weight:700;
    padding:3px 9px; border-radius:999px; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.5);
  }
  .card .body{padding:11px 13px 13px}
  .card .body h3{font-size:.95rem; margin-bottom:4px}
  .card .meta{font-size:.78rem; color:var(--muted); display:flex; justify-content:space-between; gap:6px}
  .empty{
    grid-column:1/-1; text-align:center; color:var(--muted); padding:50px 20px; line-height:1.7;
  }
  .empty .big{font-size:3rem}
  /* ---------- FAB ---------- */
  .fab{
    position:fixed; right:22px; bottom:calc(22px + env(safe-area-inset-bottom)); z-index:1100;
    width:60px; height:60px; border-radius:50%; border:none; cursor:pointer;
    background:var(--green); color:#fff; font-size:2rem; line-height:1;
    box-shadow:0 6px 18px rgba(0,0,0,.45);
  }
  .fab:hover{background:var(--green-bright)}
  /* ---------- Modals ---------- */
  .modal-back{
    position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:2000;
    display:none; align-items:flex-start; justify-content:center; overflow-y:auto; padding:5vh 14px 40px;
  }
  .modal-back.open{display:flex}
  .modal{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    width:100%; max-width:480px; padding:22px;
  }
  .modal h2{font-size:1.1rem; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between}
  .modal h2 .x{cursor:pointer; color:var(--muted); font-size:1.4rem; line-height:1; background:none; border:none}
  .field{margin-bottom:13px}
  .field label{display:block; font-size:.78rem; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px}
  .field input, .field select, .field textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:10px 12px; font-size:.95rem; outline:none; font-family:inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--green-bright)}
  .field textarea{resize:vertical; min-height:64px}
  /* searchable country combo */
  .combo{position:relative}
  .combo-list{
    position:absolute; left:0; right:0; top:calc(100% + 4px); z-index:50;
    background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
    max-height:210px; overflow-y:auto; display:none;
  }
  .combo-list.open{display:block}
  .combo-item{padding:9px 12px; cursor:pointer; font-size:.9rem; display:flex; gap:8px; align-items:center}
  .combo-item:hover, .combo-item.active{background:rgba(0,168,98,.15)}
  .combo-item .dot{width:9px;height:9px;border-radius:50%;flex:none}
  /* photo controls */
  .photo-row{display:flex; gap:9px; flex-wrap:wrap}
  .photo-preview{
    margin-top:10px; border-radius:10px; overflow:hidden; border:1px solid var(--line);
    max-height:220px; display:none; position:relative;
  }
  .photo-preview img{width:100%; max-height:220px; object-fit:cover; display:block}
  .photo-preview .rm{
    position:absolute; top:8px; right:8px;
  }
  .form-actions{display:flex; gap:10px; margin-top:18px; justify-content:flex-end}
  /* camera modal */
  #camVideo{width:100%; border-radius:12px; background:#000; max-height:60vh}
  /* detail modal */
  .detail-photo{width:100%; border-radius:12px; margin-bottom:14px; max-height:52vh; object-fit:contain; background:var(--panel-2)}
  .detail-rows{font-size:.92rem; line-height:2}
  .detail-rows b{color:var(--muted); font-weight:600; margin-right:6px}
  /* map pin */
  .pin{
    display:flex; align-items:center; justify-content:center;
    border-radius:50% 50% 50% 0; transform:rotate(-45deg);
    border:2px solid rgba(255,255,255,.85); box-shadow:0 2px 6px rgba(0,0,0,.5);
    color:#fff; font-weight:700; font-size:.72rem;
  }
  .pin span{transform:rotate(45deg)}
  .leaflet-popup-content-wrapper{background:var(--panel); color:var(--text); border-radius:12px}
  .leaflet-popup-tip{background:var(--panel)}
  .pop-cup{display:flex; gap:9px; align-items:center; padding:5px 0; cursor:pointer}
  .pop-cup img{width:42px; height:42px; object-fit:cover; border-radius:8px}
  .pop-cup .ph{width:42px;height:42px;border-radius:8px;background:var(--panel-2);display:flex;align-items:center;justify-content:center;font-size:1.2rem}
  .pop-cup:hover{color:var(--green-bright)}
  #toast{
    position:fixed; bottom:calc(96px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); z-index:3000;
    background:var(--green-dark); border:1px solid var(--green); color:#fff;
    padding:10px 20px; border-radius:999px; font-size:.88rem; display:none;
  }
  @media (max-width:640px){
    #map{height:42vh}
    #list{grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); padding:14px 14px 90px}
    .card .thumb{height:120px}
    .stats{width:100%; margin-left:0}
  }
</style>
</head>
<body>

<header>
  <h1><span class="siren">☕</span> Cup Atlas <small style="color:var(--muted);font-weight:400">· Starbucks collection</small></h1>
  <div class="stats">
    <div class="stat"><b id="statCups">0</b><span>Cups</span></div>
    <div class="stat"><b id="statCountries">0</b><span>Countries</span></div>
  </div>
</header>

<div class="toolbar">
  <input type="search" id="q" placeholder="Search cups, cities, notes…">
  <select id="fCountry"><option value="">All countries</option></select>
  <select id="fSeries"><option value="">All series</option></select>
  <button class="btn btn-ghost" id="btnExport" title="Download a JSON backup (with photos)">⬇ Backup</button>
  <button class="btn btn-ghost" id="btnImport" title="Restore / merge from a JSON backup">⬆ Import</button>
  <input type="file" id="importFile" accept="application/json" hidden>
</div>

<main>
  <div id="map"></div>
  <div class="legend-strip" id="legend"></div>
  <div id="list"></div>
</main>

<button class="fab" id="btnAdd" title="Add a cup">+</button>
<div id="toast"></div>

<!-- Add / Edit modal -->
<div class="modal-back" id="formModal">
  <div class="modal">
    <h2><span id="formTitle">Add a cup</span><button class="x" data-close="formModal">×</button></h2>
    <form id="cupForm">
      <div class="field">
        <label>Photo</label>
        <div class="photo-row">
          <button type="button" class="btn btn-ghost btn-sm" id="btnPickPhoto">🖼 Upload image</button>
          <button type="button" class="btn btn-ghost btn-sm" id="btnCamera">📷 Take picture</button>
          <button type="button" class="btn btn-primary btn-sm" id="btnScan" style="display:none">✨ Scan cup</button>
        </div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:6px">Add a photo and the AI <b>scans it automatically</b>, filling the details below — check them and Save. (Re-run anytime with ✨ Scan cup.)</div>
        <input type="file" id="photoFile" accept="image/*" hidden>
        <input type="file" id="photoCapture" accept="image/*" capture="environment" hidden>
        <div class="photo-preview" id="photoPreview">
          <img id="photoPreviewImg" alt="cup photo preview">
          <button type="button" class="btn btn-danger btn-sm rm" id="btnRemovePhoto">✕</button>
        </div>
      </div>
      <div class="field">
        <label>Cup name *</label>
        <input id="fName" required maxlength="80" placeholder='e.g. "You Are Here — Tokyo"'>
      </div>
      <div class="field combo">
        <label>Country *</label>
        <input id="fCountryIn" autocomplete="off" required placeholder="Type to search…">
        <input type="hidden" id="fCountryCode">
        <div class="combo-list" id="comboList"></div>
      </div>
      <div class="field">
        <label>City (optional)</label>
        <input id="fCity" maxlength="60" placeholder="e.g. Tokyo">
      </div>
      <div class="field">
        <label>Series</label>
        <select id="fSeriesIn">
          <option>You Are Here</option>
          <option>Been There</option>
          <option>Global Icon</option>
          <option>City Mugs (Skyline)</option>
          <option>Architecture</option>
          <option>Relief</option>
          <option>Discovery</option>
          <option>Icon Mini / Ornament</option>
          <option>Anniversary</option>
          <option>Holiday / Christmas</option>
          <option>Sakura / Seasonal</option>
          <option>Siren / Core</option>
          <option>Reserve</option>
          <option>Tumbler</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Date acquired</label>
        <input type="date" id="fDate">
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="fNotes" maxlength="500" placeholder="Where you got it, who gave it, condition…"></textarea>
      </div>
      <div class="field">
        <label>PIN (required to save)</label>
        <input id="fPin" type="password" inputmode="numeric" autocomplete="off" maxlength="12" placeholder="Shared PIN">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" data-close="formModal">Cancel</button>
        <button type="submit" class="btn btn-primary" id="btnSave">Save cup</button>
      </div>
    </form>
  </div>
</div>

<!-- Camera modal -->
<div class="modal-back" id="camModal">
  <div class="modal">
    <h2>Take a picture <button class="x" id="camClose">×</button></h2>
    <video id="camVideo" autoplay playsinline muted></video>
    <div class="form-actions">
      <button type="button" class="btn btn-primary" id="camShot">📸 Capture</button>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-back" id="detailModal">
  <div class="modal">
    <h2><span id="dTitle"></span><button class="x" data-close="detailModal">×</button></h2>
    <img class="detail-photo" id="dPhoto" alt="cup photo" style="display:none">
    <div class="detail-rows" id="dRows"></div>
    <div class="form-actions">
      <button class="btn btn-danger" id="dDelete">Delete</button>
      <button class="btn btn-primary" id="dEdit">Edit</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

function countryColor(code){
  const c = CMAP.get(code);
  const hue = ((c ? c.idx : 0) * 137.508) % 360;

function flagEmoji(code){

// Legacy on-device store (pre-shared-DB) — read once so old cups can be migrated.
function legacyCups(){
  return new Promise(res=>{
    let settled=false; const done=v=>{ if(!settled){settled=true; res(v);} };
    try{
      const rq=indexedDB.open("cupatlas",1);
      rq.onupgradeneeded=()=>{ try{rq.result.createObjectStore("cups",{keyPath:"id"});}catch(_){} };
      rq.onsuccess=()=>{
        try{
          const g=rq.result.transaction("cups").objectStore("cups").getAll();
          g.onsuccess=()=>done(g.result||[]); g.onerror=()=>done([]);
        }catch(_){ done([]); }
      };
      rq.onerror=()=>done([]);
      setTimeout(()=>done([]),3000);
    }catch(_){ done([]); }
  });
}

  maxZoom:18

function renderMap(view){
  markerLayer.clearLayers();
  const byCountry=new Map();
  for(const c of view){
    if(!byCountry.has(c.country)) byCountry.set(c.country,[]);
    byCountry.get(c.country).push(c);
  }
  for(const [code,items] of byCountry){
    const info=CMAP.get(code); if(!info) continue;
    const col=countryColor(code);
    const size=items.length>1?34:28;
    const icon=L.divIcon({
      className:"", iconSize:[size,size], iconAnchor:[size/2,size],
      html:`<div class="pin" style="width:${size}px;height:${size}px;background:${col}"><span>${items.length}</span></div>`
    });
    const m=L.marker([info.lat,info.lng],{icon}).addTo(markerLayer);
    m.bindPopup(()=>popupHTML(code,items),{minWidth:200});
  }
}

  const wrap=document.createElement("div");
  wrap.innerHTML=`<b>${flagEmoji(code)} ${esc(countryName(code))}</b> — ${items.length} cup${items.length>1?"s":""}`;

    if(q){
      const hay=`${c.name} ${c.city||""} ${c.notes||""} ${countryName(c.country)} ${c.series||""}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>(b.date||"").localeCompare(a.date||"") || (b.created_at||"").localeCompare(a.created_at||""));

async function resizeImage(fileOrBlob,maxDim=1400,quality=0.85){
  const img=await new Promise((res,rej)=>{
    const u=URL.createObjectURL(fileOrBlob);
    const im=new Image();
    im.onload=()=>{ URL.revokeObjectURL(u); res(im); };
    im.onerror=()=>{ URL.revokeObjectURL(u); rej(new Error("Could not read image")); };
    im.src=u;
  });
  const scale=Math.min(1,maxDim/Math.max(img.width,img.height));
  const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
  const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
  cv.getContext("2d").drawImage(img,0,0,w,h);
  return new Promise(res=>cv.toBlob(b=>res(b),"image/jpeg",quality));
}
let previewURL=null; // object URL owned by the form preview (cache URLs are managed separately)
function clearPreviewURL(){
  if(previewURL){ URL.revokeObjectURL(previewURL); previewURL=null; }
}
function setPendingPhoto(blob){

}

// Camera (getUserMedia on desktop / secure contexts; falls back to capture input)
let camStream=null;
$("btnCamera").addEventListener("click",async()=>{
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    $("photoCapture").click(); // mobile fallback: native camera sheet
    return;
  }
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1920}},audio:false});
    $("camVideo").srcObject=camStream;
    openModal("camModal");
  }catch(e){
    $("photoCapture").click(); // permission denied / unavailable → native input
  }
});
function stopCamera(){
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }

}

  try{
    const cv=document.createElement("canvas");
    cv.width=v.videoWidth; cv.height=v.videoHeight;
    cv.getContext("2d").drawImage(v,0,0);
    const blob=await new Promise(res=>cv.toBlob(b=>res(b),"image/jpeg",0.9));
    if(blob) setPendingPhoto(await resizeImage(blob));
  }catch(err){
    toast("⚠ Capture failed — try again");
  }finally{
    closeModal("camModal"); // also stops the camera stream
  }
});

async function scanBlob(){
  if(pendingPhoto) return pendingPhoto;
  if(editingId){
    const cup=cups.find(c=>c.id===editingId);
    if(cup && cup.photo_path) return (await fetch(photoURL(cup))).blob();
  }
  return null;
}
$("btnScan").addEventListener("click",async()=>{
  const pin=$("fPin").value.trim();
  if(!pin){ toast("Enter the PIN first"); $("fPin").focus(); return; }
  const b=$("btnScan");
  b.disabled=true; b.textContent="🔍 Scanning…";
  try{
    const blob=await scanBlob();
    if(!blob){ toast("Add a photo first"); return; }
    const g=await api({action:"recognize",pin,photo_b64:await blobToDataURL(blob)});
    localStorage.setItem(PIN_KEY,pin);
    if(g.country_code && CMAP.has(g.country_code)) comboPick(g.country_code);
    if(g.name) $("fName").value=g.name;
    if(g.city) $("fCity").value=g.city;
    if(g.series) $("fSeriesIn").value=g.series;
    toast(`✨ Recognized — ${Math.round((g.confidence||0)*100)}% confident. Check & save!`);
  }catch(err){
    toast("⚠ Scan failed: "+err.message);
  }finally{
    b.disabled=false; b.textContent="✨ Scan cup";
  }
});

// ================= Backup / Import =================
function blobToDataURL(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result); r.onerror=()=>rej(r.error);
    r.readAsDataURL(blob);
  });
}
async function dataURLToBlob(u){ return (await fetch(u)).blob(); }
$("btnExport").addEventListener("click",async()=>{

    const out=[];
    for(const c of cups){
      let photo=null;
      if(c.photo_path){
        try{ photo=await blobToDataURL(await (await fetch(photoURL(c))).blob()); }catch(_){}
      }
      out.push({...c, photo});
    }
    const blob=new Blob([JSON.stringify({app:"cupatlas",version:1,exported:new Date().toISOString(),cups:out},null,1)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`cup-atlas-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    toast(`Backup downloaded (${cups.length} cups)`);
  }catch(err){
    toast("⚠ Backup failed — try again");

});

$("importFile").addEventListener("change",async e=>{
  const f=e.target.files && e.target.files[0];
  e.target.value="";
  if(!f) return;
  const pin=getPIN() || (prompt("Enter the PIN to import:")||"").trim();
  if(!pin){ toast("PIN required to import"); return; }
  try{
    const data=JSON.parse(await f.text());
    const arr=Array.isArray(data)?data:data.cups;
    if(!Array.isArray(arr)) throw new Error("bad format");
    let done=0;
    for(const raw of arr){
      if(!raw || !raw.name || !CMAP.has(raw.country)) continue;
      const payload={action:"save",pin,cup:{
        id:(typeof raw.id==="string" && /^[0-9a-f-]{36}$/.test(raw.id))?raw.id:undefined,
        name:String(raw.name).slice(0,80), country:raw.country,
        city:String(raw.city||"").slice(0,60), series:String(raw.series||"Other").slice(0,40),
        date:/^\d{4}-\d{2}-\d{2}$/.test(String(raw.date||""))?String(raw.date):null,
        notes:String(raw.notes||"").slice(0,500)
      }};
      if(typeof raw.photo==="string" && raw.photo.startsWith("data:")) payload.photo_b64=raw.photo;
      await api(payload);
      done++;
    }
    localStorage.setItem(PIN_KEY,pin);
    toast(`Import done — ${done} cups uploaded`);
    cups=await loadCups(); render();
  }catch(err){
    toast("⚠ Import failed: "+err.message);
  }
});

// ================= Filters =================
["q","fCountry","fSeries"].forEach(id=>{
  $(id).addEventListener("input",render);
  $(id).addEventListener("change",render); // older Safari doesn't fire "input" on <select>
});

// ================= One-time migration of pre-shared on-device cups =================
async function offerMigration(){
  if(localStorage.getItem("cupatlas_migrated")) return;
  const old=await legacyCups();
  if(!old.length){ localStorage.setItem("cupatlas_migrated","none"); return; }
  const bar=document.createElement("div");
  bar.style.cssText="display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:12px 20px;background:var(--green-dark);border-bottom:1px solid var(--line);font-size:.9rem";
  bar.innerHTML=`<span>📦 Found <b>${old.length}</b> cup(s) saved on this device from before the shared collection.</span>
    <input id="migPin" type="password" inputmode="numeric" placeholder="PIN" style="width:90px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 10px">
    <button class="btn btn-primary btn-sm" id="migGo">Upload them</button>
    <button class="btn btn-ghost btn-sm" id="migSkip">Dismiss</button>`;
  document.querySelector(".toolbar").after(bar);
  bar.querySelector("#migPin").value=getPIN();
  bar.querySelector("#migSkip").addEventListener("click",()=>{ localStorage.setItem("cupatlas_migrated","skipped"); bar.remove(); });
  bar.querySelector("#migGo").addEventListener("click",async()=>{
    const pin=bar.querySelector("#migPin").value.trim();
    if(!pin){ toast("Enter the PIN"); return; }
    const go=bar.querySelector("#migGo"); go.disabled=true;
    let ok=0;
    try{
      for(const c of old){
        go.textContent=`Uploading ${ok+1}/${old.length}…`;
        const payload={action:"save",pin,cup:{name:c.name,country:c.country,city:c.city||"",series:c.series||"Other",date:c.date||null,notes:c.notes||""}};
        if(c.photo instanceof Blob) payload.photo_b64=await blobToDataURL(c.photo);
        await api(payload);
        ok++;
      }
      localStorage.setItem(PIN_KEY,pin);
      localStorage.setItem("cupatlas_migrated","yes");
      indexedDB.deleteDatabase("cupatlas");
      bar.remove();
      toast(`Uploaded ${ok} cups to the shared collection ✔`);
      cups=await loadCups(); render();
    }catch(err){
      go.disabled=false; go.textContent="Upload them";
      toast(`⚠ Stopped after ${ok}: ${err.message}`);
    }
  });
}

// ================= Boot =================
(async function(){
  try{
    cups=await loadCups();
  }catch(e){
    $("list").innerHTML=`<div class="empty"><div class="big">📡</div>
      Couldn't reach the shared collection.<br>Check your internet connection and refresh.</div>`;
    return;
  }
  render();
  if(cups.length){
    // fit map to the collection on load
    const pts=[...new Set(cups.map(c=>c.country))].map(c=>CMAP.get(c)).filter(Boolean).map(c=>[c.lat,c.lng]);
    if(pts.length===1) map.setView(pts[0],4);
    else if(pts.length>1) map.fitBounds(L.latLngBounds(pts).pad(0.3));
  }
  offerMigration();
  if("serviceWorker" in navigator && location.protocol!=="file:"){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
})();
</script>
